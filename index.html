<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DADING SHOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Kantumruy Pro', sans-serif; background-color: #f8f9fa; }
        .active { background-color: #eab308 !important; color: black !important; font-weight: bold; }
        .product-card { transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <!-- Header -->
    <header class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center text-black font-bold shadow-lg shadow-yellow-500/20">D</div>
            <div>
                <h1 class="font-bold text-white text-sm">DADING SHOP</h1>
                <p class="text-[10px] text-gray-400">គ្រឿងជាង និងសម្ភារៈបន្ទប់ទឹក</p>
            </div>
        </div>
        <button onclick="openContactModal()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-4 py-2 rounded-xl text-xs font-bold transition-all">
            <i class="fa-brands fa-telegram mr-1"></i> ទំនាក់ទំនង
        </button>
    </header>

    <!-- Search -->
    <div class="px-4 py-3 bg-white border-b border-gray-200 shrink-0">
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
            <input type="text" id="search-box" placeholder="ស្វែងរកឈ្មោះ ឬលេខកូដ..." class="w-full pl-11 pr-4 py-3 bg-gray-100 rounded-2xl outline-none text-sm border focus:border-yellow-500 transition-all" oninput="handleSearch()">
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
        <aside id="category-bar" class="w-24 md:w-48 bg-gray-50 border-r border-gray-200 overflow-y-auto p-3 space-y-2"></aside>
        <main id="app-container" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-4 content-start"></main>
    </div>

    <!-- Contact Modal -->
    <div id="contact-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
            <div class="w-16 h-16 bg-yellow-400 text-black rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-brands fa-telegram"></i>
            </div>
            <h2 class="font-bold text-xl mb-1 text-gray-900">ទំនាក់ទំនង</h2>
            <p class="text-gray-500 text-sm mb-6">ទទួលបានការប្រឹក្សាពីក្រុមការងារយើងខ្ញុំ</p>
            <a href="https://t.me/dading_boss" target="_blank" class="block bg-gray-900 text-white py-3.5 rounded-xl font-bold hover:bg-black transition-all">ចូលទៅកាន់ Telegram</a>
            <button onclick="closeContactModal()" class="mt-4 text-gray-400 text-sm hover:text-gray-600">បិទ</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzX92HdSM5e23Qkqj8Kts4WkUe-ZppHwEQGEyNQJuzQNe_o-dRqJcQNirUknH-3FBgy/exec';
        let allData = [];

        async function fetchSheetData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                allData = data.map(item => ({
                    name: item['ឈ្មោះផលិតផល'] || item['NAME'] || '',
                    code: item['CODE'] || '',
                    price: item['Sale Price'] || item['តម្លៃលក់'] || '0',
                    category: item['Category'] || item['ប្រភេទ'] || 'ផ្សេងៗ',
                    image: item['linkphoto'] || item['រូបភាព'] || '',
                    size: item['Variant/Size'] || ''
                }));
                renderCategories();
                renderProducts(allData);
            } catch (e) { console.error(e); }
        }

        function renderCategories() {
            const cats = ['ទាំងអស់', ...new Set(allData.map(i => i.category))];
            document.getElementById('category-bar').innerHTML = cats.map(cat => 
                `<button onclick="filter('${cat}', this)" class="w-full text-left p-3 text-xs rounded-xl transition-all ${cat === 'ទាំងអស់' ? 'active' : 'text-gray-600 hover:bg-gray-200'}">${cat}</button>`
            ).join('');
        }

        function filter(cat, btn) {
            document.querySelectorAll('#category-bar button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#category-bar button').forEach(b => b.classList.add('text-gray-600'));
            btn.classList.add('active');
            btn.classList.remove('text-gray-600');
            const filtered = cat === 'ទាំងអស់' ? allData : allData.filter(i => i.category === cat);
            renderProducts(filtered);
        }

        function renderProducts(items) {
            document.getElementById('app-container').innerHTML = items.map(item => `
                <div class="product-card bg-white p-3 rounded-2xl border border-gray-100 shadow-sm hover:shadow-lg transition-all">
                    <div class="relative overflow-hidden rounded-xl bg-gray-100">
                        <img src="${item.image}" class="w-full aspect-square object-cover" onerror="this.src='https://placehold.co/400x400?text=No+Img'">
                    </div>
                    <h3 class="font-bold text-gray-900 text-xs mt-3 line-clamp-2">${item.name}</h3>
                    <div class="flex items-center justify-between mt-2">
                        <p class="text-yellow-600 font-bold text-sm">$${item.price}</p>
                        <span class="text-[9px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-md font-mono">${item.code}</span>
                    </div>
                </div>
            `).join('');
        }

        function handleSearch() {
            const term = document.getElementById('search-box').value.toLowerCase();
            renderProducts(allData.filter(i => i.name.toLowerCase().includes(term) || i.code.toLowerCase().includes(term)));
        }

        function openContactModal() { document.getElementById('contact-modal').classList.remove('hidden'); }
        function closeContactModal() { document.getElementById('contact-modal').classList.add('hidden'); }
        window.onload = fetchSheetData;
    </script>
</body>
</html>
